# Enable GPIO for the LED and optional button gate.
CONFIG_GPIO=y

# Enable console output through the board's chosen UART.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# Lesson-specific Kconfig options.
CONFIG_LESSON_05_BLINK_INTERVAL_MS=300
CONFIG_LESSON_05_USE_BUTTON_GATE=y
CONFIG_LESSON_05_PRINT_COUNTER=y
