# Enable GPIO for a visible heartbeat LED.
CONFIG_GPIO=y

# Enable console output through the board's chosen UART.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# Enable Zephyr logging on the UART backend.
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BACKEND_SHOW_COLOR=n
CONFIG_LOG_DEFAULT_LEVEL=3

# Lesson-specific options.
CONFIG_LESSON_06_LOG_LEVEL=4
CONFIG_LESSON_06_HEARTBEAT_INTERVAL_MS=1000
